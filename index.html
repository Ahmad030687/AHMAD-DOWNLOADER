<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD ALI - Ultimate Downloader</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --black: #000000;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--black);
            color: var(--gold);
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        header {
            padding: 30px;
            border-bottom: 2px solid var(--gold);
            background: linear-gradient(to bottom, #1a1a1a, #000);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        .brand {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-shadow: 0 0 15px var(--gold);
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }

        .input-group {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        input[type="text"] {
            width: 70%;
            padding: 15px 25px;
            border: 2px solid var(--gold);
            background: #111;
            color: #fff;
            border-radius: 50px 0 0 50px;
            outline: none;
            font-size: 1rem;
        }

        .btn-search {
            padding: 15px 35px;
            border: none;
            background: var(--gold);
            color: #000;
            font-weight: bold;
            border-radius: 0 50px 50px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-search:hover {
            background: var(--white);
            box-shadow: 0 0 20px var(--gold);
        }

        #resultArea {
            display: none;
            margin-top: 30px;
            background: #111;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .thumb-img {
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            border: 3px solid var(--gold);
            margin-bottom: 20px;
        }

        /* Split Section */
        .split-container {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            position: relative;
        }

        .split-line {
            width: 2px;
            background: var(--white);
            height: auto;
            margin: 0 10px;
        }

        .side {
            flex: 1;
            padding: 10px;
        }

        .side h3 {
            color: var(--white);
            margin-bottom: 20px;
            text-decoration: underline;
        }

        .dl-btn {
            display: block;
            width: 90%;
            margin: 10px auto;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .btn-v { background: var(--gold); color: #000; }
        .btn-a { background: transparent; color: var(--gold); border: 1px solid var(--gold); }

        .dl-btn:hover {
            transform: scale(1.05);
            background: var(--white);
            color: #000;
        }

        /* Floating WhatsApp */
        .wa-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 999;
        }

        footer {
            margin-top: 50px;
            padding: 30px;
            border-top: 1px solid #333;
            color: #555;
            font-weight: bold;
        }

        .credit { color: var(--gold); font-size: 1.2rem; }

        /* Loader */
        .loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="brand">AHMAD ALI</div>
    </header>

    <div class="container">
        <h2 style="color:white">Professional Video Downloader</h2>
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Enter Video URL (YT, FB, Insta, TikTok, Snapchat)">
            <button class="btn-search" onclick="startProcess()">DOWNLOAD</button>
        </div>

        <div id="loading" class="loader"></div>

        <div id="resultArea">
            <img id="thumbnail" class="thumb-img" src="" alt="Thumbnail">
            <h4 id="videoTitle" style="color:var(--gold)"></h4>
            
            <div class="split-container">
                <div class="side">
                    <h3>AUDIO MP3</h3>
                    <div id="audioButtons"></div>
                </div>

                <div class="split-line"></div>

                <div class="side">
                    <h3>VIDEO MP4</h3>
                    <div id="videoButtons"></div>
                </div>
            </div>
        </div>
    </div>

    <a href="https://wa.me/923068796622" class="wa-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer>
        DESIGNED BY <br>
        <span class="credit">AHMAD ALI</span>
    </footer>

    <script>
        // Force Download Function (Direct Download)
        async function forceDownload(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
            } catch (error) {
                // If CORS fails, open in new tab as fallback
                window.open(url, '_blank');
            }
        }

        async function startProcess() {
            const url = document.getElementById('urlInput').value;
            const loader = document.getElementById('loading');
            const result = document.getElementById('resultArea');
            const vButtons = document.getElementById('videoButtons');
            const aButtons = document.getElementById('audioButtons');

            if (!url) return alert("Link toh dalo bhai!");

            loader.style.display = 'block';
            result.style.display = 'none';
            vButtons.innerHTML = '';
            aButtons.innerHTML = '';

            try {
                let apiUrl = "";
                
                // Platform Check
                if (url.includes("youtube.com") || url.includes("youtu.be")) {
                    apiUrl = `https://raza-api-taupe.vercel.app/download/ytdl?url=${encodeURIComponent(url)}`;
                } else if (url.includes("instagram.com")) {
                    apiUrl = `https://api.princetechn.com/api/download/instadl?apikey=prince&url=${encodeURIComponent(url)}`;
                } else {
                    apiUrl = `https://ahmad-rdx-api-7x1p.onrender.com/downloader/aiodl?apikey=AhmadRDX&url=${encodeURIComponent(url)}`;
                }

                const res = await axios.get(apiUrl);
                const data = res.data;

                // UI Update
                document.getElementById('thumbnail').src = data.result.thumbnail || 'https://via.placeholder.com/400x250?text=AHMAD+ALI';
                document.getElementById('videoTitle').innerText = data.result.title || "Premium Video Download";

                // Generate Quality Buttons (144p to 1080p)
                if (url.includes("youtube.com")) {
                    // YouTube Specific
                    const formats = ["144p", "360p", "480p", "720p", "1080p"];
                    formats.forEach(q => {
                        vButtons.innerHTML += `<button class="dl-btn btn-v" onclick="forceDownload('${data.result.mp4}', 'Video_${q}.mp4')">${q} HD MP4</button>`;
                    });
                    aButtons.innerHTML += `<button class="dl-btn btn-a" onclick="forceDownload('${data.result.mp3}', 'Audio.mp3')">Download MP3</button>`;
                } else {
                    // Others (FB, Insta, TikTok, Snapchat)
                    if (data.result.links && data.result.links.video) {
                        data.result.links.video.forEach(v => {
                            vButtons.innerHTML += `<button class="dl-btn btn-v" onclick="forceDownload('${v.url}', 'Video.mp4')">Download ${v.resolution || 'MP4'}</button>`;
                        });
                    } else if (data.result.download_url || data.result.url) {
                        let link = data.result.download_url || data.result.url;
                        vButtons.innerHTML += `<button class="dl-btn btn-v" onclick="forceDownload('${link}', 'Video.mp4')">Download 720p/1080p</button>`;
                    }
                    aButtons.innerHTML += `<p style="color:gray; font-size:12px">Audio extracting...</p>`;
                }

                loader.style.display = 'none';
                result.style.display = 'block';

            } catch (err) {
                alert("API Error! Try again.");
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
