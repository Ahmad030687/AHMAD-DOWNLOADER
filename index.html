<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD ALI - Ultimate Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --black: #000000;
            --card-bg: #080808;
            --gold: #D4AF37;
            --bright-gold: #FFD700;
            --white: #ffffff;
            --border: rgba(212, 175, 55, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--black);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at top right, #1a1500, #000);
        }

        /* Top Bar */
        .top-nav {
            width: 100%;
            padding: 15px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--gold);
            color: var(--gold);
            font-weight: 800;
            letter-spacing: 5px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .app-container {
            width: 92%;
            max-width: 650px;
            padding-top: 40px;
            text-align: center;
        }

        .app-logo {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }

        .search-wrapper {
            background: #111;
            border: 2px solid var(--gold);
            border-radius: 50px;
            display: flex;
            padding: 6px;
            margin: 30px 0;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
        }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 0 20px;
            font-size: 1rem;
        }

        .btn-extract {
            background: linear-gradient(45deg, var(--gold), var(--bright-gold));
            color: black;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-extract:active { transform: scale(0.9); }

        /* Loader */
        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #222;
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Result Card */
        #download-card {
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: none;
            animation: fadeIn 0.6s ease-out;
            margin-bottom: 50px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #video-thumb { 
            width: 100%; 
            border-bottom: 3px solid var(--gold);
            display: block; 
        }

        .video-meta { padding: 20px; background: #000; }
        #v-title { color: var(--gold); font-size: 1.1rem; font-weight: 500; }

        /* SEPARATION GRID */
        .button-hub {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            padding: 25px 15px;
            background: #050505;
            align-items: center;
        }

        .separation-line {
            width: 2px;
            height: 180px;
            background: var(--white);
            box-shadow: 0 0 10px var(--white);
            margin: 0 10px;
        }

        .hub-col { display: flex; flex-direction: column; gap: 12px; }
        .col-tag { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 10px; 
            font-weight: 800;
        }

        /* Quality Buttons */
        .dl-action-btn {
            text-decoration: none;
            padding: 14px 8px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid var(--border);
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-v { color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .btn-v:hover { background: var(--gold); color: black; }

        .btn-a { color: var(--white); background: rgba(255, 255, 255, 0.05); border-color: var(--white); }
        .btn-a:hover { background: var(--white); color: black; }

        /* WhatsApp Button */
        .wa-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px; height: 65px;
            background: #25d366;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 32px;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
            z-index: 1000;
        }

        .footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            color: #444;
            font-size: 12px;
            letter-spacing: 4px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="top-nav">CREATED BY AHMAD ALI</div>

    <div class="app-container">
        <h1 class="app-logo">AHMAD RDX</h1>
        <p style="color:#666">Premium All Video & Audio Downloader</p>
        
        <div class="search-wrapper">
            <input type="text" id="userInput" placeholder="Paste video link here...">
            <button class="btn-extract" onclick="fetchData()"><i class="fas fa-bolt"></i></button>
        </div>

        <div class="loader" id="loader"></div>

        <div id="download-card">
            <img src="" id="video-thumb">
            <div class="video-meta">
                <div id="v-title">Loading Title...</div>
            </div>

            <div class="button-hub">
                <div class="hub-col">
                    <div class="col-tag" style="color:var(--gold)">MP4 VIDEO</div>
                    <div onclick="startDownload('1080p')" class="dl-action-btn btn-v"><i class="fas fa-crown"></i> 1080p HD</div>
                    <div onclick="startDownload('720p')" class="dl-action-btn btn-v"><i class="fas fa-video"></i> 720p</div>
                    <div onclick="startDownload('480p')" class="dl-action-btn btn-v"><i class="fas fa-play"></i> 480p</div>
                    <div onclick="startDownload('360p')" class="dl-action-btn btn-v"><i class="fas fa-mobile"></i> 360p</div>
                    <div onclick="startDownload('144p')" class="dl-action-btn btn-v"><i class="fas fa-bolt"></i> 144p</div>
                </div>

                <div class="separation-line"></div>

                <div class="hub-col">
                    <div class="col-tag" style="color:white">MP3 AUDIO</div>
                    <div onclick="startDownload('mp3')" class="dl-action-btn btn-a"><i class="fas fa-music"></i> Audio HQ</div>
                    <div onclick="startDownload('mp3')" class="dl-action-btn btn-a"><i class="fas fa-headphones"></i> Music</div>
                    <div onclick="startDownload('mp3')" class="dl-action-btn btn-a"><i class="fas fa-bolt"></i> Fast MP3</div>
                </div>
            </div>
        </div>
    </div>

    <a href="https://wa.me/923068796622" class="wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <div class="footer">DEVELOPED BY <span style="color:var(--gold)">AHMAD ALI</span></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let videoStore = { mp4: '', mp3: '', title: '' };

        async function fetchData() {
            const url = document.getElementById('userInput').value;
            const card = document.getElementById('download-card');
            const loader = document.getElementById('loader');

            if (!url) return alert("Bhai, link toh dalo!");

            card.style.display = 'none';
            loader.style.display = 'block';

            try {
                let api = "";
                if (url.includes('youtube') || url.includes('youtu.be')) {
                    api = `https://raza-api-taupe.vercel.app/download/ytdl?url=${encodeURIComponent(url)}`;
                } else if (url.includes('instagram.com')) {
                    api = `https://api.princetechn.com/api/download/instadl?apikey=prince&url=${encodeURIComponent(url)}`;
                } else {
                    api = `https://ahmad-rdx-api-7x1p.onrender.com/downloader/aiodl?apikey=AhmadRDX&url=${encodeURIComponent(url)}`;
                }

                const res = await axios.get(api);
                const data = res.data;

                if (url.includes('youtube')) {
                    videoStore.mp4 = data.result.mp4;
                    videoStore.mp3 = data.result.mp3;
                    videoStore.title = data.result.title;
                    document.getElementById('video-thumb').src = `https://img.youtube.com/vi/${url.split('v=')[1]?.split('&')[0] || url.split('/').pop()}/hqdefault.jpg`;
                } else if (url.includes('instagram')) {
                    videoStore.mp4 = data.result.download_url;
                    videoStore.mp3 = data.result.download_url; // No separate audio for IG usually
                    videoStore.title = "Instagram Video";
                    document.getElementById('video-thumb').src = data.result.thumbnail;
                } else {
                    const r = data.result;
                    videoStore.mp4 = r.links.video[0].url;
                    videoStore.mp3 = r.links.video[0].url;
                    videoStore.title = r.title || "Social Video";
                    document.getElementById('video-thumb').src = r.thumbnail;
                }

                document.getElementById('v-title').innerText = videoStore.title;
                loader.style.display = 'none';
                card.style.display = 'block';

            } catch (e) {
                loader.style.display = 'none';
                alert("API Error! Please check link or try again.");
            }
        }

        // --- THE FIXED DOWNLOAD LOGIC ---
        async function startDownload(quality) {
            const fileUrl = quality === 'mp3' ? videoStore.mp3 : videoStore.mp4;
            const fileName = `AHMAD_RDX_${quality}.mp4`;

            alert("📥 Download start ho raha hai... Agar page khul jaye toh video par 'Long Press' karke 'Save Video' karein.");

            // Trick 1: Attempt to use Blob (Might fail due to CORS)
            try {
                const response = await fetch(fileUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                // Trick 2: Fallback - Open in new tab with instructions
                const link = document.createElement('a');
                link.href = fileUrl;
                link.target = "_blank";
                link.setAttribute("download", fileName);
                link.click();
            }
        }
    </script>
</body>
</html>
