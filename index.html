<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD ALI | Pro Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --black: #000000;
            --surface: #0a0a0b;
            --accent-blue: #00d2ff;
            --accent-pink: #ff007a;
            --gold: #ffac00;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--black);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Bar */
        .header-top {
            width: 100%;
            padding: 15px;
            text-align: center;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--gold);
            font-size: 14px;
        }

        .container {
            width: 92%;
            max-width: 600px;
            margin: 40px 0;
            text-align: center;
        }

        h1 { font-size: 2.2rem; margin-bottom: 5px; color: #fff; }
        .sub-txt { color: #666; font-size: 14px; margin-bottom: 30px; }

        /* Search Box - Luxury Style */
        .search-area {
            position: relative;
            background: var(--surface);
            border-radius: 20px;
            padding: 6px;
            display: flex;
            border: 1px solid var(--border);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .search-area input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 15px 20px;
            font-size: 16px;
        }

        .btn-search {
            background: var(--gold);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 15px;
            color: black;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-search:active { transform: scale(0.9); }

        /* Loader */
        .loader {
            display: none;
            margin: 20px auto;
            border: 3px solid #111;
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result Section */
        #result-box {
            margin-top: 30px;
            background: var(--surface);
            border-radius: 25px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #thumb-display { width: 100%; border-bottom: 1px solid var(--border); }
        .v-info { padding: 15px; font-weight: 500; font-size: 15px; color: #eee; }

        /* Download Hub - Two Columns */
        .download-hub {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            background: #050505;
        }

        .col-header {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .dl-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 12px;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.2s;
            cursor: pointer;
        }

        /* Video Buttons Style */
        .btn-v { color: var(--accent-blue); }
        .btn-v:hover { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); }

        /* Audio Buttons Style */
        .btn-a { color: var(--accent-pink); }
        .btn-a:hover { background: var(--accent-pink); color: #fff; border-color: var(--accent-pink); }

        .dl-btn span { font-weight: 600; font-size: 13px; }
        .dl-btn i { font-size: 14px; }

        /* WhatsApp */
        .wa-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px; height: 60px;
            background: #25d366;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            z-index: 100;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            color: #444;
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header-top">BY AHMAD ALI</div>

    <div class="container">
        <h1>PREMIUM DL</h1>
        <p class="sub-txt">All-in-one Professional Media Downloader</p>

        <div class="search-area">
            <input type="text" id="urlInput" placeholder="Paste link here...">
            <button class="btn-search" onclick="fetchContent()"><i class="fas fa-arrow-down"></i></button>
        </div>

        <div class="loader" id="loader"></div>

        <div id="result-box">
            <img src="" id="thumb-display">
            <div class="v-info" id="title-display">Video Title</div>

            <div class="download-hub">
                <div>
                    <div class="col-header">Video (MP4)</div>
                    <div onclick="forceDownload('1080p')" class="dl-btn btn-v"><span>1080p HD</span> <i class="fas fa-download"></i></div>
                    <div onclick="forceDownload('720p')" class="dl-btn btn-v"><span>720p HD</span> <i class="fas fa-download"></i></div>
                    <div onclick="forceDownload('480p')" class="dl-btn btn-v"><span>480p SD</span> <i class="fas fa-download"></i></div>
                </div>

                <div>
                    <div class="col-header">Audio (MP3)</div>
                    <div onclick="forceDownload('mp3')" class="dl-btn btn-a"><span>MP3 Music</span> <i class="fas fa-music"></i></div>
                    <div onclick="forceDownload('audio')" class="dl-btn btn-a"><span>HQ Audio</span> <i class="fas fa-volume-up"></i></div>
                </div>
            </div>
        </div>
    </div>

    <a href="https://wa.me/923068796622" class="wa-float"><i class="fab fa-whatsapp"></i></a>

    <footer>CREATED BY <span style="color:var(--gold)">AHMAD ALI</span> &copy; 2026</footer>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let currentLinks = { video: '', audio: '', title: '' };

        async function fetchContent() {
            const url = document.getElementById('urlInput').value;
            const resBox = document.getElementById('result-box');
            const loader = document.getElementById('loader');

            if (!url) return alert("Please paste a link!");

            resBox.style.display = 'none';
            loader.style.display = 'block';

            try {
                let apiUrl = "";
                
                if (url.includes('youtube') || url.includes('youtu.be')) {
                    apiUrl = `https://raza-api-taupe.vercel.app/download/ytdl?url=${encodeURIComponent(url)}`;
                    const res = await axios.get(apiUrl);
                    currentLinks.video = res.data.result.mp4;
                    currentLinks.audio = res.data.result.mp3;
                    currentLinks.title = res.data.result.title;
                    document.getElementById('thumb-display').src = "https://img.youtube.com/vi/" + (url.split('v=')[1]?.split('&')[0] || url.split('/').pop()) + "/mqdefault.jpg";
                } 
                else if (url.includes('instagram.com')) {
                    apiUrl = `https://api.princetechn.com/api/download/instadl?apikey=prince&url=${encodeURIComponent(url)}`;
                    const res = await axios.get(apiUrl);
                    currentLinks.video = res.data.result.download_url;
                    currentLinks.audio = res.data.result.download_url;
                    currentLinks.title = "Instagram Video";
                    document.getElementById('thumb-display').src = res.data.result.thumbnail;
                }
                else {
                    apiUrl = `https://ahmad-rdx-api-7x1p.onrender.com/downloader/aiodl?apikey=AhmadRDX&url=${encodeURIComponent(url)}`;
                    const res = await axios.get(apiUrl);
                    currentLinks.video = res.data.result.links.video[0].url;
                    currentLinks.audio = res.data.result.links.video[0].url;
                    currentLinks.title = res.data.result.title || "Social Video";
                    document.getElementById('thumb-display').src = res.data.result.thumbnail;
                }

                document.getElementById('title-display').innerText = currentLinks.title;
                loader.style.display = 'none';
                resBox.style.display = 'block';

            } catch (e) {
                loader.style.display = 'none';
                alert("API Error. Please try again later.");
            }
        }

        // Logic to force download directly to gallery/storage
        function forceDownload(type) {
            const link = (type === 'mp3' || type === 'audio') ? currentLinks.audio : currentLinks.video;
            const fileName = currentLinks.title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + (type === 'mp3' ? ".mp3" : ".mp4");

            // Notification for user
            alert("Downloading started... It will save to your Gallery shortly.");

            const anchor = document.createElement('a');
            anchor.href = link;
            anchor.download = fileName;
            anchor.target = "_blank"; // Fallsback for mobile
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
        }
    </script>
</body>
</html>
